# SPDX-PackageName: marlin-personal
# SPDX-PackageSupplier: Ryan Finnie <ryan@finnie.org>
# SPDX-PackageDownloadLocation: https://codeberg.org/rfinnie/marlin-personal
# SPDX-FileComment: Woodpecker CI personal workflow
# SPDX-FileCopyrightText: © 2026 Ryan Finnie <ryan@finnie.org>
# SPDX-License-Identifier: MPL-2.0
---
when:
  - event: ["push", "pull_request", "manual"]
matrix:
  include:
    - TARGET: "e3v2"
    - TARGET: "wdi3p"
labels:
  platform: "linux/amd64"
steps:
  - name: "Clone upstream"
    image: "debian"
    commands: |
      apt update
      apt -y install git

      git clone --depth=1 --no-tags --branch=bugfix-2.1.x https://github.com/MarlinFirmware/Marlin
      git clone --depth=1 --no-tags --branch=bugfix-2.1.x https://github.com/MarlinFirmware/Configurations
  - name: "Build (${TARGET})"
    image: "python:3.14-trixie"
    commands: |
      python -m pip install platformio
      ./build-firmware "$${TARGET}"
      artifact_fn="${CI_REPO_NAME}-${CI_PIPELINE_CREATED}-${CI_WORKFLOW_NAME}-$${TARGET}-${CI_PIPELINE_NUMBER}.tar.gz"
      mkdir -p .artifacts-dist
      tar zcvf ".artifacts-dist/$${artifact_fn}" -C .artifacts .
  - name: "Upload artifacts"
    image: "woodpeckerci/plugin-s3"
    settings:
      endpoint: "http://nibbler.snowman.lan:3900"
      path_style: true
      region: "garage"
      bucket: "ci-artifacts"
      access_key:
        from_secret: "garage_access_key"
      secret_key:
        from_secret: "garage_secret_key"
      source: ".artifacts-dist/*"
      strip_prefix: ".artifacts-dist/"
      target: "/"
  - name: "Notify Mastodon if failure"
    when:
      - status: ["failure"]
    image: "woodpeckerci/plugin-mastodon-post"
    settings:
      server_url: "https://m29.us"
      access_token:
        from_secret: "m29_token"
      status: |
        🪿 🪿 🪿 FAILURE: {{ CI_REPO }} 🪿 🪿 🪿
        Workflow: {{ CI_WORKFLOW_NAME }} ({{ CI_PIPELINE_EVENT }} on {{ CI_COMMIT_REF }})

        Pipeline: {{ CI_PIPELINE_URL }}
        Commit: {{ CI_PIPELINE_FORGE_URL }}
